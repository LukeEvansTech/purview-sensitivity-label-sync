# Canonical lint workflow for zensical docs repos.
# Thin caller of LukeEvansTech/shared-workflows super-linter reusable.
# Replace b89dbe8050d6672572d731ca2e4c08fb822dae3e with the shared-workflows main SHA (automated by rollout_zensical_standard.py).
name: Lint

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write
  pull-requests: write

jobs:
  lint:
    uses: LukeEvansTech/shared-workflows/.github/workflows/super-linter.yml@b89dbe8050d6672572d731ca2e4c08fb822dae3e # v1
    with:
      soft-launch: false
