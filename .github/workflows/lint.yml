# Canonical lint workflow for zensical docs repos.
# Thin caller of LukeEvansTech/shared-workflows super-linter reusable.
# Replace feb3e1e7524534b460bf26c682bd806c83818e1d with the shared-workflows main SHA (automated by rollout_zensical_standard.py).
name: Lint

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write
  pull-requests: write

jobs:
  lint:
    uses: LukeEvansTech/shared-workflows/.github/workflows/super-linter.yml@feb3e1e7524534b460bf26c682bd806c83818e1d # v1
    with:
      soft-launch: false
