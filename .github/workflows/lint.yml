# Canonical lint workflow for zensical docs repos.
# Thin caller of LukeEvansTech/shared-workflows super-linter reusable.
# Replace efc6fd245fd65e1bb3b6ef36e2582eb354f8772a with the shared-workflows main SHA (automated by rollout_zensical_standard.py).
name: Lint

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write
  pull-requests: write

jobs:
  lint:
    uses: LukeEvansTech/shared-workflows/.github/workflows/super-linter.yml@efc6fd245fd65e1bb3b6ef36e2582eb354f8772a # v1
    with:
      soft-launch: false
