# Canonical lint workflow for zensical docs repos.
# Thin caller of LukeEvansTech/shared-workflows super-linter reusable.
# Replace 92767a6e7f6ea65a303cd0508d927769a86b7ec8 with the shared-workflows main SHA (automated by rollout_zensical_standard.py).
name: Lint

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write
  pull-requests: write

jobs:
  lint:
    uses: LukeEvansTech/shared-workflows/.github/workflows/super-linter.yml@92767a6e7f6ea65a303cd0508d927769a86b7ec8 # v1
    with:
      soft-launch: false
